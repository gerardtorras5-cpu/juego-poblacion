<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Poblaciones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de inicio -->
    <section id="start-screen" class="screen active">
        <h1>Juego de Poblaciones</h1>

        <input id="playerNameInput" type="text" placeholder="Tu nombre">
        <input id="passwordInput" type="password" placeholder="Contraseña">

        <button onclick="login()">Continuar</button>
        <button onclick="showRanking()">Ranking Global</button>
        <button id="logoutBtn" onclick="logout()" style="display:none;">Cerrar sesión</button>
    </section>

    <!-- Pantalla de juego -->
    <section id="game-screen" class="screen">
        <div class="top-bar">
            <div id="lives">❤️❤️❤️</div>
            <div id="xp">XP: 0</div>
            <div id="level-text">Nivel 1</div>
        </div>

        <button id="menu-btn" onclick="goToMenu()" class="menu-btn">Menú</button>

        <h2 id="country-name">País</h2>
        <input id="populationInput" type="number" placeholder="Población en millones">
        <button onclick="submitAnswer()">Enviar</button>

        <p id="round-result"></p>

        <!-- Notificación de nivel -->
        <div id="level-up-notification"></div>
    </section>

    <!-- Pantalla de Game Over -->
    <section id="gameover-screen" class="screen">
        <h1>Game Over</h1>
        <p id="final-xp"></p>
        <p id="final-level"></p>
        <button onclick="restartGame()">Reiniciar partida</button>
        <button onclick="goToMenu()">Volver al menú</button>
    </section>

    <!-- Pantalla de Ranking -->
    <section id="ranking-screen" class="screen">
        <h1>Ranking Global</h1>
        <table id="ranking-table">
            <thead>
                <tr>
                    <th>Jugador</th>
                    <th>Nivel</th>
                    <th>XP</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="goToMenu()">Volver</button>
    </section>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <script src="script.js"></script>
    <div id="save-notification">Progreso guardado ✔</div>
</body>
</html>
