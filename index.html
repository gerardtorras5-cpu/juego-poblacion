<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego de Población</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Juego de Población</h1>
  <p class="subtitle">Acierta la población con un margen del 5%</p>

  <h2 id="country-name"></h2>

  <input id="answer" type="number" step="0.1" placeholder="Población en millones">

  <button id="check">Comprobar</button>
  <button id="new">Nuevo país</button>

  <div id="result"></div>

  <div class="xp-box">
    XP Total: <span id="xp-total">0</span>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
